services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - index:/data/index
      - pyterrier_cache:/root/.pyterrier
      - ir_datasets_cache:/root/.ir_datasets
    environment:
      INDEX_PATH: /data/index
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 5

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "8501:8501"
    environment:
      API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy

volumes:
  index:              # persists the Terrier on-disk index across restarts
  pyterrier_cache:    # caches downloaded Terrier JARs across rebuilds
  ir_datasets_cache:  # persists Highwire corpus downloads (~2 GB) across restarts
